name: Build Custom Alterra Bazzite Image
on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Custom System Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Project Repository Tree
        uses: actions/checkout@v4

      - name: Force Build and Compile Core OS Image
        uses: bluebuild/github-action@v1
        with:
          recipe: 'recipe.yml'
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          prune: true
