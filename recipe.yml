name: bazzite-alterra
description: Subnautica alterra boot build
base-image: ghcr.io/ublue-os/bazzite-deck
image-version: stable

# FORCE DISABLE SIGNING TO COMPLETE SKIPP COSIGN CHECKS
signing: false

modules:
  # FORCE INSTALL FFMPEG UTILITIES VIA NATIVE PACKAGE CONTAINER
  - type: rpm-ostree
    install:
      - ffmpeg

  - type: script
    snippets:
      - |
        mkdir -p /usr/share/plymouth/themes/spinner
        ffmpeg -y -i /workspace/ALTERRA/alterra_spinning.mp4 -vf "scale=1920:1080" /usr/share/plymouth/themes/spinner/loop_%03d.png
        ffmpeg -y -i /workspace/ALTERRA/alterra_loading.mp4 -vf "scale=1920:1080" /usr/share/plymouth/themes/spinner/intro_%03d.png
